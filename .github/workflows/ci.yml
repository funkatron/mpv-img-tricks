name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install ripgrep (tests use rg)
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Unit tests
        run: ./tests/run-unit.sh

  # Scoped until mpv-pipeline.sh / img-effects.sh are ShellCheck-clean (R-14).
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: ShellCheck (scripts/lib + small entrypoints)
        run: |
          set -euo pipefail
          shellcheck scripts/lib/*.sh
          shellcheck scripts/image-effects.sh
          shellcheck scripts/slideshow.sh
          shellcheck scripts/images-to-video.sh
